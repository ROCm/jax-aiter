name: JAX-AITER CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: [linux-jax-aiter-mi355-1]

    env:
      IMAGE: ghcr.io/rocm/jax-base-ubu24.rocm720:latest
      CONTAINER_NAME: rv_aiter_ci
      JA_ROOT_DIR: /jax-aiter
      AITER_SYMBOL_VISIBLE: 1
      GPU_ARCHS: "gfx942;gfx950"
      AITER_ASM_DIR: /jax-aiter/third_party/aiter/hsa/

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get third_party/aiter submodule SHA
        id: aiter_sha
        run: echo "sha=$(git -C third_party/aiter rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create aiter_build directory
        run: mkdir -p build/aiter_build

      - name: Restore AITER JIT modules cache
        id: aiter_cache
        uses: actions/cache@v4
        with:
          path: |
            build/aiter_build/*.so
          key: >
            aiter-so-${{ runner.os }}
            -aiter-${{ steps.aiter_sha.outputs.sha }}
            -jit-${{ hashFiles('jax_aiter/jit/**') }}
            -cfg-${{ hashFiles('**/optCompilerConfig.json') }}

      - name: Pull container image
        run: docker pull "$IMAGE"

      - name: Launch build container
        run: |
          set -euxo pipefail
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run -d --name "$CONTAINER_NAME" \
            --network=host \
            --device=/dev/kfd \
            --device=/dev/dri \
            --ipc=host \
            --shm-size=16G \
            --group-add=video \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -e JA_ROOT_DIR="${{ env.JA_ROOT_DIR }}" \
            -e AITER_SYMBOL_VISIBLE="${{ env.AITER_SYMBOL_VISIBLE }}" \
            -e GPU_ARCHS="${{ env.GPU_ARCHS }}" \
            -e AITER_ASM_DIR="${{ env.AITER_ASM_DIR }}" \
            -e HIP_VISIBLE_DEVICES=0 \
            -v "${{ github.workspace }}:/jax-aiter" \
            -w "/jax-aiter" \
            "$IMAGE" tail -f /dev/null

      - name: Install tooling and JAX runtime
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              git ca-certificates curl build-essential pkg-config
            python3 -m pip install --break-system-packages cmake ninja pyyaml

            # JAX must be installed before build (Makefile needs jax.ffi.include_dir())
            python3 -m pip install --break-system-packages jax==0.9.0
            python3 -m pip install --break-system-packages \
              https://github.com/ROCm/rocm-jax/releases/download/rocm-jax-v0.9.0-rc3/jaxlib-0.9.0+rocm7-cp312-cp312-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl
            python3 -m pip install --break-system-packages \
              https://github.com/ROCm/rocm-jax/releases/download/rocm-jax-v0.9.0-rc3/jax_rocm7_plugin-0.9.0+rocm7.2.0-cp312-cp312-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl \
              https://github.com/ROCm/rocm-jax/releases/download/rocm-jax-v0.9.0-rc3/jax_rocm7_pjrt-0.9.0+rocm7.2.0-py3-none-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl
            python3 -m pip install --break-system-packages pytest pytest-rerunfailures
          '

      - name: Mark repos safe for Git
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -eux
            git config --global --add safe.directory /jax-aiter
            git config --global --add safe.directory /jax-aiter/third_party/aiter
          '

      - name: Build umbrella shared library
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            make
            ls -lh build/jax_aiter_build/libjax_aiter.so
          '

      - name: Check if JIT outputs exist
        id: have_jit
        run: |
          set -euo pipefail
          cnt=0
          if ls build/aiter_build/*.so >/dev/null 2>&1; then
            cnt=$(ls build/aiter_build/*.so | wc -l)
          fi
          echo "count=$cnt" >> "$GITHUB_OUTPUT"

      - name: Decide whether to build JIT
        id: jit_decision
        run: |
          set -euo pipefail
          cache_hit='${{ steps.aiter_cache.outputs.cache-hit }}'
          have_count='${{ steps.have_jit.outputs.count }}'
          if [[ "${cache_hit:-}" == "true" && "${have_count}" != "0" ]]; then
            echo "do_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "do_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build JIT modules
        if: steps.jit_decision.outputs.do_build == 'true'
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            python3 jax_aiter/jit/build_jit.py
            ls -lh build/aiter_build/*.so
          '

      - name: Save AITER JIT modules cache
        if: steps.jit_decision.outputs.do_build == 'true' && steps.aiter_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/aiter_build/*.so
          key: >
            aiter-so-${{ runner.os }}
            -aiter-${{ steps.aiter_sha.outputs.sha }}
            -jit-${{ hashFiles('jax_aiter/jit/**') }}
            -cfg-${{ hashFiles('**/optCompilerConfig.json') }}

      - name: Build FFI modules
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            make ja_mods
            ls -lh build/jax_aiter_build/*.so
          '

      - name: Install AITER and JAX-AITER
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            pip install --break-system-packages third_party/aiter
            pip install --break-system-packages .
          '

      - name: Smoke test
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            python3 -c "from jax_aiter.mha import flash_attn_func, flash_attn_varlen; print(\"jax-aiter import OK\")"
          '

      - name: Run tests (1 GPU, ~45 seconds)
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            set -euxo pipefail
            export XLA_PYTHON_CLIENT_ALLOCATOR=platform
            export XLA_FLAGS="--xla_gpu_force_compilation_parallelism=1 --xla_gpu_enable_nccl_comm_splitting=false --xla_gpu_enable_command_buffer="
            python3 -m pytest -v --reruns 2 tests/test_mha_ja.py
          '

      - name: Build summary
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc '
            echo "=== Build Artifacts ==="
            echo "Umbrella:"; ls -lh build/jax_aiter_build/libjax_aiter.so 2>/dev/null || echo "Not found"
            echo "AITER JIT:"; ls -lh build/aiter_build/*.so 2>/dev/null || echo "None"
            echo "FFI modules:"; ls -lh build/jax_aiter_build/*.so 2>/dev/null || echo "None"
          ' || true

      - name: Cleanup
        if: always()
        run: docker rm -f "$CONTAINER_NAME" || true
